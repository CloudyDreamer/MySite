<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4dc;
    --ink: #1a1a1a;
    --muted: #888;
    --border: #c8c4bc;
    --accent: #c0392b;
    --panel-left: 220px;
    --panel-right: 340px;
    --mono: 'IBM Plex Mono', monospace;
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.18);
  }

  .night-mode {
    --bg: #0a0a0a;
    --ink: #f0f0f0;
    --muted: #aaaaaa;
    --border: #222222;
    --accent: #ff5e4f;
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
  }

  .sunny-mode {
    --glass-bg: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    height: 100vh;
    overflow: hidden;
    transition: background 0.4s ease;
    position: relative;
  }

  /* Sunny calming background - only when toggled */
  body.sunny-mode::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: 
      radial-gradient(circle at 30% 20%, rgba(255,240,180,0.18) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(180,255,200,0.15) 0%, transparent 60%);
    pointer-events: none;
    opacity: 0.9;
    animation: sunnyLight 28s linear infinite;
  }

  @keyframes sunnyLight {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(12px, -15px) rotate(2deg); }
  }

  body.sunny-mode::after {
    content: '🍃 🌿 🍂 🌱';
    position: fixed;
    inset: 0;
    z-index: -1;
    font-size: 32px;
    opacity: 0.06;
    pointer-events: none;
    animation: floatingLeaves 45s linear infinite;
    white-space: pre;
    overflow: hidden;
  }

  @keyframes floatingLeaves {
    0% { transform: translateY(120vh) rotate(0deg); }
    100% { transform: translateY(-120vh) rotate(380deg); }
  }

  #main-view { display: flex; height: 100vh; width: 100%; }

  /* Glassmorphism */
  #panel-left, #panel-mid, #panel-right, .compose-bar, .gallery-header, .gallery-item {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    transition: all 0.4s ease;
  }

  #panel-left { border-right: none; }
  #panel-mid { border-right: none; }
  #panel-right { border-left: none; }

  #panel-left { width: var(--panel-left); min-width: var(--panel-left); height: 100vh; display: flex; flex-direction: column; padding: 28px 20px; overflow-y: auto; z-index: 10; }
  #panel-left::-webkit-scrollbar { width: 3px; }
  #panel-left::-webkit-scrollbar-thumb { background: var(--border); }

  .site-name { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 14px; line-height: 1; }
  .site-tagline { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; font-weight: 300; }

  .left-section-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 20px; }
  .left-nav-link { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: color 0.15s; margin-bottom: 8px; margin-top: 20px; display: block; }
  .left-nav-link:hover { color: var(--ink); }

  .archive-list { list-style: none; margin-bottom: 10px; }
  .archive-list li { font-size: 11.5px; padding: 3px 0; cursor: pointer; transition: color 0.15s; color: var(--ink); }
  .archive-list li:hover { color: var(--accent); }

  .archive-date-group { margin-bottom: 14px; }
  .archive-month { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }

  .left-spacer { flex: 1; }
  .social-link { font-size: 11px; color: var(--muted); text-decoration: none; transition: color 0.15s; display: block; padding: 2px 0; }
  .social-link:hover { color: var(--ink); }

  #panel-mid { flex: 1; height: 100vh; overflow-y: scroll; padding: 28px 28px 80px; scroll-behavior: smooth; }
  #panel-mid::-webkit-scrollbar { width: 4px; }
  #panel-mid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .post { margin-bottom: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border); opacity: 0; transform: translateY(10px); animation: fadeUp 0.4s forwards; }
  .post:last-child { border-bottom: none; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .post-meta { font-size: 10px; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.04em; }
  .post-text { font-size: 13px; line-height: 1.85; white-space: pre-wrap; font-weight: 300; }

  .post-image-thumb { margin-top: 16px; width: 100%; max-width: 320px; aspect-ratio: 4/3; object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: opacity 0.2s; display: block; }
  .post-image-thumb:hover { opacity: 0.8; }

  .compose-bar { position: fixed; bottom: 0; left: var(--panel-left); right: var(--panel-right); padding: 12px 28px; display: flex; gap: 10px; align-items: flex-start; z-index: 100; }
  .compose-area { flex: 1; font-family: var(--mono); font-size: 12px; background: transparent; border: none; outline: none; resize: none; color: var(--ink); min-height: 36px; max-height: 120px; line-height: 1.6; }
  .compose-area::placeholder { color: var(--muted); }
  .compose-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .compose-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 12px; background: var(--ink); color: var(--bg); border: none; cursor: pointer; transition: background 0.15s; }
  .compose-btn:hover { background: var(--accent); }
  .compose-img-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 4px 10px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .compose-img-btn:hover { border-color: var(--ink); color: var(--ink); }
  #file-input { display: none; }
  .compose-preview { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  .compose-preview-thumb { width: 52px; height: 52px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }

  #panel-right { width: var(--panel-right); min-width: var(--panel-right); height: 100vh; overflow-y: scroll; }

  .gallery-header { padding: 28px 20px 10px; display: flex; justify-content: space-between; align-items: baseline; position: sticky; top: 0; z-index: 5; }
  .gallery-header-label { font-size: 9px; letter-spacing: 0.08em; color: var(--muted); cursor: pointer; background: none; border: none; font-family: var(--mono); text-transform: uppercase; transition: color 0.15s; }
  .gallery-header-label:hover { color: var(--ink); }
  .gallery-sort-toggle, .theme-toggle { font-size: 9px; letter-spacing: 0.08em; color: var(--muted); cursor: pointer; background: none; border: none; font-family: var(--mono); text-transform: uppercase; transition: color 0.15s; }
  .gallery-sort-toggle:hover, .theme-toggle:hover { color: var(--ink); }

  .gallery-grid { display: flex; flex-direction: column; }
  .gallery-item { border-bottom: 1px solid var(--border); cursor: pointer; position: relative; overflow: hidden; }
  .gallery-item.pinned::before { content: '↑ PINNED'; position: absolute; top: 8px; left: 8px; font-size: 8px; letter-spacing: 0.1em; background: var(--ink); color: var(--bg); padding: 2px 6px; z-index: 2; }
  .gallery-img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; transition: opacity 0.2s; }
  .gallery-item:hover .gallery-img { opacity: 0.85; }

  .gallery-item-meta { 
    padding: 8px 14px 10px; display: flex; justify-content: space-between; align-items: baseline; 
    opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
  }
  .gallery-item.text-visible .gallery-item-meta { opacity: 1; pointer-events: auto; }
  .gallery-item.text-visible { background: rgba(255,255,255,0.06); }

  .gallery-item-caption { font-size: 10px; color: var(--muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gallery-item-date { font-size: 9px; color: var(--border); flex-shrink: 0; }
  .pin-btn {
    position: absolute; top: 8px; right: 8px; background: var(--glass-bg);
    border: 1px solid var(--glass-border); font-family: var(--mono); font-size: 8px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; cursor: pointer; opacity: 0; transition: opacity 0.15s; z-index: 3;
  }
  .gallery-item:hover .pin-btn { opacity: 1; }
  .pin-btn:hover, .pin-btn.pinned-active { background: var(--ink); color: var(--bg); opacity: 1; }
  .empty-gallery { padding: 40px 20px; font-size: 11px; color: var(--muted); text-align: center; }

  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px; z-index: 9999;
  }

  #gallery-page { display: none; height: 100vh; width: 100%; background: var(--bg); flex-direction: row; }
  #gallery-page.active { display: flex; }

  #gallery-topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; border-bottom: 1px solid var(--border); background: var(--glass-bg); backdrop-filter: blur(20px); display: flex; align-items: center; padding: 0 24px; gap: 20px; z-index: 200; }
  .back-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: none; border: none; color: var(--muted); cursor: pointer; transition: color 0.15s; padding: 0; }
  .back-btn:hover { color: var(--ink); }
  .gallery-page-title { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
  .gallery-page-count { font-size: 10px; color: var(--muted); margin-left: auto; }

  #gallery-viewer { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 70px 64px 24px; position: relative; min-width: 0; }
  #gallery-main-img { max-width: 100%; max-height: calc(100vh - 200px); object-fit: contain; display: block; transition: opacity 0.2s; }
  .gallery-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--glass-bg); border: 1px solid var(--glass-border); font-family: var(--mono); font-size: 20px; color: var(--ink); width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; z-index: 10; }
  .gallery-nav-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  #gallery-prev { left: 12px; }
  #gallery-next { right: 12px; }

  #gallery-img-caption { margin-top: 16px; font-size: 12px; color: var(--muted); text-align: center; max-width: 520px; line-height: 1.7; font-weight: 300; }
  #gallery-img-date { margin-top: 6px; font-size: 10px; color: var(--border); text-align: center; }

  #gallery-thumbs { width: 200px; min-width: 200px; height: 100vh; padding-top: 48px; border-left: 1px solid var(--border); overflow-y: auto; background: var(--glass-bg); backdrop-filter: blur(20px); display: flex; flex-direction: column; }
  #gallery-thumbs::-webkit-scrollbar { width: 3px; }
  #gallery-thumbs::-webkit-scrollbar-thumb { background: var(--border); }

  .thumb-item { flex-shrink: 0; cursor: pointer; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .thumb-item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; transition: opacity 0.15s; }
  .thumb-item:hover img { opacity: 0.75; }
  .thumb-item.active::after { content: ''; position: absolute; inset: 0; border: 2px solid var(--ink); pointer-events: none; }
  .thumb-item-label { padding: 5px 8px 6px; font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #gallery-empty-page { display: none; align-items: center; justify-content: center; height: 100%; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div id="main-view">
  <aside id="panel-left">
    <div class="site-name">ARCHIVE</div>
    <div class="site-tagline">a personal archive of thoughts, images, and fragments.</div>
    <div class="left-section-label">Posts</div>
    <div id="archive-index"></div>
    <div class="left-section-label" style="margin-top:24px;">View</div>
    <div class="left-nav-link" onclick="openGalleryPage()">Gallery</div>
    <div class="left-spacer"></div>
    <div class="left-section-label">Social</div>
    <a class="social-link" href="#">x.com/handle</a>
    <a class="social-link" href="#">instagram</a>
  </aside>

  <main id="panel-mid">
    <div id="posts-container"></div>
    <div class="compose-bar">
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
        <textarea class="compose-area" id="compose-text" rows="2" placeholder="write something..."></textarea>
        <div class="compose-preview" id="compose-preview"></div>
      </div>
      <div class="compose-actions">
        <button class="compose-btn" onclick="publishPost()">POST</button>
        <button class="compose-img-btn" onclick="document.getElementById('file-input').click()">+ IMG</button>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleImageSelect(event)">
  </main>

  <aside id="panel-right">
    <div class="gallery-header">
      <span class="gallery-header-label" onclick="openGalleryPage()">gallery</span>
      <div style="display:flex;gap:16px;">
        <button class="gallery-sort-toggle" onclick="toggleGallerySort()">
          <span id="sort-label">chronological</span>
        </button>
        <button class="theme-toggle" onclick="toggleNightMode()" id="night-btn"><span id="night-icon">🌙</span></button>
        <button class="theme-toggle" onclick="toggleSunnyMode()" id="sunny-btn"><span id="sunny-icon">☀️</span></button>
      </div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="empty-gallery" id="gallery-empty" style="display:none;">no images yet.</div>
  </aside>
</div>

<div id="gallery-page">
  <div id="gallery-topbar">
    <button class="back-btn" onclick="closeGalleryPage()">← back</button>
    <span class="gallery-page-title">Gallery</span>
    <span class="gallery-page-count" id="gallery-page-count"></span>
  </div>
  <div id="gallery-viewer">
    <div id="gallery-empty-page">No images uploaded yet.</div>
    <img id="gallery-main-img" src="" alt="" style="display:none;">
    <button class="gallery-nav-btn" id="gallery-prev" onclick="galleryNav(-1)" style="display:none;">←</button>
    <button class="gallery-nav-btn" id="gallery-next" onclick="galleryNav(1)" style="display:none;">→</button>
    <div id="gallery-img-caption"></div>
    <div id="gallery-img-date"></div>
  </div>
  <div id="gallery-thumbs"></div>
</div>

<script>
let posts = [];
let galleryImages = [];
let galleryPinned = new Set();
let showPinnedFirst = false;
let pendingImageData = [];
let currentGalleryIndex = 0;

function saveData() {
  localStorage.setItem('archive_posts', JSON.stringify(posts));
  localStorage.setItem('archive_gallery', JSON.stringify(galleryImages));
  localStorage.setItem('archive_pinned', JSON.stringify(Array.from(galleryPinned)));
  localStorage.setItem('archive_night', document.documentElement.classList.contains('night-mode') ? '1' : '0');
  localStorage.setItem('archive_sunny', document.body.classList.contains('sunny-mode') ? '1' : '0');
}

function loadData() {
  const savedPosts = localStorage.getItem('archive_posts');
  const savedGallery = localStorage.getItem('archive_gallery');
  const savedPinned = localStorage.getItem('archive_pinned');
  if (savedPosts) posts = JSON.parse(savedPosts);
  if (savedGallery) galleryImages = JSON.parse(savedGallery);
  if (savedPinned) galleryPinned = new Set(JSON.parse(savedPinned));

  if (localStorage.getItem('archive_night') === '1') {
    document.documentElement.classList.add('night-mode');
    document.getElementById('night-icon').textContent = '☀️';
  }
  if (localStorage.getItem('archive_sunny') === '1') {
    document.body.classList.add('sunny-mode');
  }
}

function seedData() {
  if (posts.length > 0) return;
  const now = Date.now(), day = 86400000;
  posts = [
    { id: 1, text: `10yo me would think i am cool.\nthat's all i care about.`, timestamp: now - day*3, images: [] },
    { id: 2, text: `you're not burned out.\nyou're addicted.\n\nnot to work.\nto stimulation.\n\n...`, timestamp: now - day*2, images: [] },
    { id: 3, text: `logo and icon set for Die Carz`, timestamp: now - day*1, images: [] }
  ];
  const defs = [
    { sym: 'X', bg: '#2d2d2d', cap: 'logo and icon set — primary mark.' },
    { sym: '◎', bg: '#4a3728', cap: 'icon set — secondary marks.' },
    { sym: '▲', bg: '#1a3a2a', cap: 'wordmark variations.' }
  ];
  galleryImages = defs.map((d, i) => ({
    id: 'g'+i, dataUrl: makeSVG(d.sym, d.bg), caption: d.cap,
    timestamp: now - day*(1 - i*0.2), postId: 3
  }));
}

function makeSVG(sym, bg) {
  const s = `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><rect width='400' height='300' fill='${bg}'/><text x='200' y='170' text-anchor='middle' font-size='100' fill='rgba(255,255,255,0.15)' font-family='monospace'>${sym}</text></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(s);
}

function getSortedImages() {
  let imgs = [...galleryImages];
  if (showPinnedFirst) {
    imgs.sort((a,b) => (galleryPinned.has(a.id)?0:1) - (galleryPinned.has(b.id)?0:1) || b.timestamp - a.timestamp);
  } else {
    imgs.sort((a,b) => b.timestamp - a.timestamp);
  }
  return imgs;
}

function toggleNightMode() {
  const night = document.documentElement.classList.toggle('night-mode');
  document.getElementById('night-icon').textContent = night ? '☀️' : '🌙';
  saveData();
}

function toggleSunnyMode() {
  document.body.classList.toggle('sunny-mode');
  saveData();
}

function closeGalleryPage() {
  document.getElementById('gallery-page').classList.remove('active');
  document.getElementById('main-view').style.display = 'flex';
  document.querySelectorAll('.gallery-item').forEach(item => item.classList.remove('text-visible'));
}

function renderPosts() {
  const c = document.getElementById('posts-container');
  c.innerHTML = '';
  const sorted = [...posts].sort((a,b) => a.timestamp - b.timestamp);
  sorted.forEach((post, i) => {
    const div = document.createElement('div');
    div.className = 'post';
    div.id = 'post-'+post.id;
    div.style.animationDelay = (i*0.05)+'s';
    let imgs = '';
    post.images?.forEach(img => {
      if (img.dataUrl) imgs += `<img class="post-image-thumb" src="${img.dataUrl}" onclick="openGalleryPage()" alt="">`;
    });
    div.innerHTML = `<div class="post-meta">${formatDate(post.timestamp)}</div><div class="post-text">${escapeHtml(post.text)}</div>${imgs}`;
    c.appendChild(div);
  });
  renderArchiveIndex(sorted);
}

function renderArchiveIndex(sorted) {
  const c = document.getElementById('archive-index');
  c.innerHTML = '';
  const groups = {};
  sorted.forEach(p => {
    const k = new Date(p.timestamp).toLocaleString('en', {month:'long',year:'numeric'});
    if (!groups[k]) groups[k] = [];
    groups[k].push(p);
  });
  Object.entries(groups).reverse().forEach(([month, ps]) => {
    const g = document.createElement('div');
    g.className = 'archive-date-group';
    const m = document.createElement('div');
    m.className = 'archive-month';
    m.textContent = month;
    g.appendChild(m);
    const ul = document.createElement('ul');
    ul.className = 'archive-list';
    ps.slice().reverse().forEach(post => {
      const li = document.createElement('li');
      const prev = post.text.split('\n')[0].slice(0,26);
      li.textContent = prev + (post.text.length>26?'…':'');
      li.onclick = () => document.getElementById('post-'+post.id)?.scrollIntoView({behavior:'smooth',block:'start'});
      ul.appendChild(li);
    });
    g.appendChild(ul);
    c.appendChild(g);
  });
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  grid.innerHTML = '';
  const images = getSortedImages();
  if (images.length === 0) { empty.style.display='block'; return; }
  empty.style.display = 'none';

  images.forEach((img, i) => {
    const isPinned = galleryPinned.has(img.id);
    const item = document.createElement('div');
    item.className = 'gallery-item' + (isPinned?' pinned':'');

    const gi = document.createElement('img');
    gi.className = 'gallery-img';
    gi.src = img.dataUrl;
    gi.loading = 'lazy';

    const pb = document.createElement('button');
    pb.className = 'pin-btn' + (isPinned?' pinned-active':'');
    pb.textContent = isPinned ? '↓ Unpin' : '↑ Pin';

    const meta = document.createElement('div');
    meta.className = 'gallery-item-meta';
    meta.innerHTML = `<span class="gallery-item-caption">${escapeHtml(img.caption||'')}</span><span class="gallery-item-date">${formatDateShort(img.timestamp)}</span>`;

    item.appendChild(gi);
    item.appendChild(pb);
    item.appendChild(meta);

    gi.addEventListener('click', (e) => {
      e.stopPropagation();
      item.classList.toggle('text-visible');
      openGalleryPage(i);
    });

    pb.addEventListener('click', e => { 
      e.stopPropagation(); 
      togglePin(img.id); 
    });

    grid.appendChild(item);
  });
}

function toggleGallerySort() {
  showPinnedFirst = !showPinnedFirst;
  document.getElementById('sort-label').textContent = showPinnedFirst ? 'pinned first' : 'chronological';
  renderGallery();
}

function togglePin(id) {
  galleryPinned.has(id) ? galleryPinned.delete(id) : galleryPinned.add(id);
  renderGallery();
  saveData();
}

function openGalleryPage(startIndex) {
  currentGalleryIndex = (startIndex !== undefined) ? startIndex : 0;
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('gallery-page').classList.add('active');
  renderGalleryPage();
}

function renderGalleryPage() {
  const images = getSortedImages();
  const mainImg = document.getElementById('gallery-main-img');
  const emptyEl = document.getElementById('gallery-empty-page');
  const thumbsEl = document.getElementById('gallery-thumbs');
  const countEl = document.getElementById('gallery-page-count');
  const captionEl = document.getElementById('gallery-img-caption');
  const dateEl = document.getElementById('gallery-img-date');
  const prevBtn = document.getElementById('gallery-prev');
  const nextBtn = document.getElementById('gallery-next');

  if (images.length === 0) {
    mainImg.style.display = 'none';
    emptyEl.style.display = 'flex';
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    countEl.textContent = '';
    captionEl.textContent = '';
    dateEl.textContent = '';
    thumbsEl.innerHTML = '';
    return;
  }

  emptyEl.style.display = 'none';
  mainImg.style.display = 'block';
  prevBtn.style.display = 'flex';
  nextBtn.style.display = 'flex';

  if (currentGalleryIndex >= images.length) currentGalleryIndex = 0;
  if (currentGalleryIndex < 0) currentGalleryIndex = images.length - 1;

  const img = images[currentGalleryIndex];
  mainImg.src = img.dataUrl;
  captionEl.textContent = img.caption || '';
  dateEl.textContent = formatDate(img.timestamp);
  countEl.textContent = `${currentGalleryIndex+1} / ${images.length}`;

  thumbsEl.innerHTML = '';
  images.forEach((im, i) => {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (i===currentGalleryIndex?' active':'');
    const timg = document.createElement('img');
    timg.src = im.dataUrl;
    timg.loading = 'lazy';
    const label = document.createElement('div');
    label.className = 'thumb-item-label';
    label.textContent = im.caption || '—';
    item.appendChild(timg);
    item.appendChild(label);
    item.addEventListener('click', () => { currentGalleryIndex = i; renderGalleryPage(); });
    thumbsEl.appendChild(item);
    if (i === currentGalleryIndex) setTimeout(() => item.scrollIntoView({block:'nearest'}), 0);
  });
}

function galleryNav(dir) {
  const images = getSortedImages();
  currentGalleryIndex = (currentGalleryIndex + dir + images.length) % images.length;
  renderGalleryPage();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('gallery-page').classList.contains('active')) return;
  if (e.key === 'ArrowLeft') galleryNav(-1);
  if (e.key === 'ArrowRight') galleryNav(1);
  if (e.key === 'Escape') closeGalleryPage();
});

function handleImageSelect(event) {
  Array.from(event.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { pendingImageData.push({dataUrl: e.target.result, caption:''}); renderComposePreviews(); };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderComposePreviews() {
  const preview = document.getElementById('compose-preview');
  preview.innerHTML = '';
  pendingImageData.forEach((img, i) => {
    const el = document.createElement('img');
    el.src = img.dataUrl;
    el.className = 'compose-preview-thumb';
    el.title = 'click to remove';
    el.onclick = () => { pendingImageData.splice(i,1); renderComposePreviews(); };
    preview.appendChild(el);
  });
}

function publishPost() {
  const text = document.getElementById('compose-text').value.trim();
  if (!text && pendingImageData.length === 0) return;
  const now = Date.now();
  const newPost = { id: now, text, timestamp: now, images: pendingImageData.map(img => ({dataUrl: img.dataUrl, caption: img.caption})) };
  posts.unshift(newPost);
  pendingImageData.forEach((img, i) => {
    galleryImages.unshift({ id:'g'+now+i, dataUrl: img.dataUrl, caption: text||'', timestamp: now, postId: now });
  });
  pendingImageData = [];
  document.getElementById('compose-text').value = '';
  document.getElementById('compose-preview').innerHTML = '';
  renderPosts();
  renderGallery();
  saveData();
  setTimeout(() => document.getElementById('panel-mid').scrollTo({top:0,behavior:'smooth'}), 50);
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en',{day:'2-digit',month:'short',year:'numeric'}) + ' · ' + d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function formatDateShort(ts) { return new Date(ts).toLocaleDateString('en',{day:'2-digit',month:'short'}); }
function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// INIT
loadData();
seedData();
renderPosts();
renderGallery();

document.getElementById('compose-text').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
