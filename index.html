<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE</title>

<style>
  :root {
    --bg: #e8e4dc;
    --ink: #1a1a1a;
    --muted: #888;
    --border: #c8c4bc;
    --accent: #c0392b;
    --panel-left: 220px;
    --panel-right: 340px;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    height: 100vh;
    overflow: hidden;
  }

  #main-view { display: flex; height: 100vh; width: 100%; }

  /* ── LEFT PANEL ── */
  #panel-left {
    width: var(--panel-left);
    min-width: var(--panel-left);
    height: 100vh;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    overflow-y: auto;
    background: var(--bg);
    z-index: 10;
  }
  #panel-left::-webkit-scrollbar { width: 3px; }
  #panel-left::-webkit-scrollbar-thumb { background: var(--border); }

  .site-name { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 14px; line-height: 1; }
  .site-tagline { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; font-weight: 300; }

  .left-section-label {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; margin-top: 20px;
  }
  .left-nav-link {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); cursor: pointer; transition: color 0.15s; margin-bottom: 8px; margin-top: 20px; display: block;
  }
  .left-nav-link:hover { color: var(--ink); }

  .archive-list { list-style: none; margin-bottom: 10px; }
  .archive-list li { font-size: 11.5px; padding: 3px 0; cursor: pointer; transition: color 0.15s; color: var(--ink); }
  .archive-list li:hover { color: var(--accent); }

  .archive-date-group { margin-bottom: 14px; }
  .archive-month { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }

  .left-spacer { flex: 1; }
  .social-link { font-size: 11px; color: var(--muted); text-decoration: none; transition: color 0.15s; display: block; padding: 2px 0; }
  .social-link:hover { color: var(--ink); }

  /* ── MIDDLE PANEL ── */
  #panel-mid {
    flex: 1; height: 100vh; overflow-y: scroll;
    border-right: 1px solid var(--border); padding: 28px 28px 80px; scroll-behavior: smooth;
  }
  #panel-mid::-webkit-scrollbar { width: 4px; }
  #panel-mid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .post {
    margin-bottom: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border);
    opacity: 0; transform: translateY(10px); animation: fadeUp 0.4s forwards;
  }
  .post:last-child { border-bottom: none; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .post-meta { font-size: 10px; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.04em; }
  .post-text { font-size: 13px; line-height: 1.85; white-space: pre-wrap; font-weight: 300; }

  .post-image-thumb {
    margin-top: 16px; width: 100%; max-width: 320px; aspect-ratio: 4/3;
    object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: opacity 0.2s; display: block;
  }
  .post-image-thumb:hover { opacity: 0.8; }
