<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE • Cloudy Writes</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4dc;
    --ink: #1a1a1a;
    --muted: #888;
    --border: #c8c4bc;
    --accent: #c0392b;
    --panel-left: 220px;
    --panel-right: 340px;
    --mono: 'IBM Plex Mono', monospace;
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.18);
  }

  .night-mode {
    --bg: #0a0a0a;
    --ink: #f0f0f0;
    --muted: #aaaaaa;
    --border: #222222;
    --accent: #ff5e4f;
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Calming backgrounds - more visible */
  body.calm-leaves::before, body.calm-clouds::before, body.calm-rain::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  }
  body.calm-leaves::before { background: radial-gradient(circle at 30% 20%, rgba(255,240,180,0.28) 0%, transparent 55%), radial-gradient(circle at 70% 60%, rgba(180,255,200,0.25) 0%, transparent 65%); animation: sunnyLight 28s linear infinite; }
  body.calm-leaves::after { content: '🍃 🌿 🍂 🌱'; position: fixed; inset: 0; z-index: -1; font-size: 42px; opacity: 0.14; animation: floatingLeaves 42s linear infinite; white-space: pre; }
  body.calm-clouds::before { background: radial-gradient(circle at 20% 30%, rgba(240,240,255,0.38) 0%, transparent 70%), radial-gradient(circle at 80% 50%, rgba(220,240,255,0.32) 0%, transparent 65%); animation: slowDrift 70s linear infinite; }
  body.calm-clouds::after { content: '☁️  ☁️  ☁️'; position: fixed; inset: 0; z-index: -1; font-size: 58px; opacity: 0.09; animation: floatingClouds 75s linear infinite; white-space: pre; }
  body.calm-rain::before { background: linear-gradient(to bottom, rgba(180,220,255,0.22) 0%, transparent 75%); animation: rainMist 20s linear infinite; }
  body.calm-rain::after { content: '🌧️ 🌧️'; position: fixed; inset: 0; z-index: -1; font-size: 26px; opacity: 0.11; animation: lightRain 14s linear infinite; white-space: pre; }

  @keyframes sunnyLight { 0% { transform: translate(0,0); } 100% { transform: translate(15px,-18px); } }
  @keyframes floatingLeaves { 0% { transform: translateY(130vh) rotate(0deg); } 100% { transform: translateY(-130vh) rotate(360deg); } }
  @keyframes slowDrift { 0% { transform: translate(0,0); } 100% { transform: translate(25px,-30px); } }
  @keyframes floatingClouds { 0% { transform: translateY(110vh); } 100% { transform: translateY(-110vh); } }
  @keyframes rainMist { 0% { transform: translateY(0); } 100% { transform: translateY(-40px); } }
  @keyframes lightRain { 0% { transform: translateY(0); } 100% { transform: translateY(-90vh); } }

  #main-view { display: flex; height: 100vh; width: 100%; }

  /* Glass */
  #panel-left, #panel-mid, #panel-right, .compose-bar, .gallery-header, .gallery-item {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
  }

  #panel-left { width: var(--panel-left); min-width: var(--panel-left); height: 100vh; display: flex; flex-direction: column; padding: 28px 20px; overflow-y: auto; border-right: none; }
  #panel-mid { flex: 1; height: 100vh; overflow-y: scroll; padding: 28px 28px 80px; border-right: none; }
  #panel-right { width: var(--panel-right); min-width: var(--panel-right); height: 100vh; overflow-y: scroll; border-left: none; }

  .site-name { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 14px; }
  .site-tagline { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; font-weight: 300; }

  .left-section-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 24px 0 8px; }
  .left-nav-link { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); cursor: pointer; margin-bottom: 8px; display: block; }
  .left-nav-link:hover { color: var(--ink); }

  /* About Page */
  #about-page {
    display: none; position: fixed; inset: 0; background: var(--bg); flex-direction: column;
    align-items: center; justify-content: center; padding: 80px 40px; text-align: center; z-index: 100;
  }
  #about-page.active { display: flex; }

  .about-title {
    font-family: 'Playfair Display', serif;
    font-size: 88px;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.05em;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 32px;
  }

  .about-subtitle {
    font-size: 15px;
    max-width: 480px;
    line-height: 1.75;
    color: var(--muted);
  }

  .back-btn {
    position: absolute; top: 32px; left: 32px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    background: none; border: none; color: var(--muted); cursor: pointer;
  }
  .back-btn:hover { color: var(--ink); }

  /* Gallery & Posts styles (kept clean) */
  .gallery-header { padding: 28px 20px 10px; display: flex; justify-content: space-between; align-items: baseline; position: sticky; top: 0; z-index: 5; }
  .gallery-sort-toggle, .theme-toggle { font-size: 9px; letter-spacing: 0.08em; color: var(--muted); cursor: pointer; background: none; border: none; text-transform: uppercase; }
  .gallery-sort-toggle:hover, .theme-toggle:hover { color: var(--ink); }

  .gallery-item { border-bottom: 1px solid var(--border); position: relative; overflow: hidden; cursor: pointer; }
  .gallery-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
  .gallery-item-meta { padding: 8px 14px 10px; display: flex; justify-content: space-between; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .gallery-item.text-visible .gallery-item-meta { opacity: 1; pointer-events: auto; }
  .gallery-item-caption { font-size: 10px; color: var(--muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .post { margin-bottom: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border); }
  .post-meta { font-size: 10px; color: var(--muted); margin-bottom: 14px; }
  .post-text { font-size: 13px; line-height: 1.85; white-space: pre-wrap; }

  .compose-bar { position: fixed; bottom: 0; left: var(--panel-left); right: var(--panel-right); background: var(--glass-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 12px 28px; display: flex; gap: 10px; z-index: 200; }
  .compose-area { flex: 1; font-family: var(--mono); font-size: 12px; background: transparent; border: none; outline: none; resize: none; color: var(--ink); min-height: 36px; }
  .compose-area::placeholder { color: var(--muted); }
</style>
</head>
<body>

<div id="main-view">
  <aside id="panel-left">
    <div class="site-name">ARCHIVE</div>
    <div class="site-tagline">a personal archive of thoughts, images, and fragments.</div>

    <div class="left-section-label">NAVIGATION</div>
    <div class="left-nav-link" onclick="showMainView()">HOME</div>
    <div class="left-nav-link" onclick="showAboutPage()">ABOUT</div>
    <div class="left-nav-link" onclick="openGalleryPage()">GALLERY</div>

    <div class="left-section-label">POSTS</div>
    <div id="archive-index"></div>

    <div class="left-spacer"></div>
    <div class="left-section-label">SOCIAL</div>
    <a class="social-link" href="#">x.com/handle</a>
    <a class="social-link" href="#">instagram</a>
  </aside>

  <main id="panel-mid">
    <div id="posts-container"></div>
  </main>

  <aside id="panel-right">
    <div class="gallery-header">
      <span class="gallery-header-label" onclick="openGalleryPage()">GALLERY</span>
      <div style="display:flex; gap:14px;">
        <button class="gallery-sort-toggle" onclick="toggleGallerySort()"><span id="sort-label">CHRONOLOGICAL</span></button>
        <button class="theme-toggle" onclick="toggleNightMode()" id="night-btn"><span id="night-icon">🌙</span></button>
        <button class="theme-toggle" onclick="cycleCalmMode()" id="calm-btn"><span id="calm-icon">🌫️</span></button>
      </div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="empty-gallery" id="gallery-empty" style="display:none;">no images yet.</div>
  </aside>
</div>

<!-- About Page -->
<div id="about-page">
  <button class="back-btn" onclick="hideAboutPage()">← BACK</button>
  <div class="about-title">Cloudy Writes</div>
  <div class="about-subtitle">
    A personal space for my art, writing,<br>and half-formed ideas.
  </div>
</div>

<!-- Gallery Full View -->
<div id="gallery-page" style="display:none;">
  <!-- ... your gallery code here if needed, but for now keeping minimal to avoid breaking -->
</div>

<script>
let posts = [];
let galleryImages = [];
let galleryPinned = new Set();
let showPinnedFirst = false;
let calmMode = 0;

function saveData() {
  localStorage.setItem('archive_posts', JSON.stringify(posts));
  localStorage.setItem('archive_gallery', JSON.stringify(galleryImages));
  localStorage.setItem('archive_pinned', JSON.stringify(Array.from(galleryPinned)));
  localStorage.setItem('archive_night', document.documentElement.classList.contains('night-mode') ? '1' : '0');
  localStorage.setItem('archive_calm', calmMode.toString());
}

function loadData() {
  if (localStorage.getItem('archive_posts')) posts = JSON.parse(localStorage.getItem('archive_posts'));
  if (localStorage.getItem('archive_gallery')) galleryImages = JSON.parse(localStorage.getItem('archive_gallery'));
  if (localStorage.getItem('archive_pinned')) galleryPinned = new Set(JSON.parse(localStorage.getItem('archive_pinned')));

  if (localStorage.getItem('archive_night') === '1') {
    document.documentElement.classList.add('night-mode');
    document.getElementById('night-icon').textContent = '☀️';
  }
  calmMode = parseInt(localStorage.getItem('archive_calm') || '0');
  applyCalmMode();
}

function applyCalmMode() {
  document.body.classList.remove('calm-leaves','calm-clouds','calm-rain');
  if (calmMode === 1) document.body.classList.add('calm-leaves');
  if (calmMode === 2) document.body.classList.add('calm-clouds');
  if (calmMode === 3) document.body.classList.add('calm-rain');
}

function cycleCalmMode() {
  calmMode = (calmMode + 1) % 4;
  applyCalmMode();
  const icons = ['🌫️','🍃','☁️','🌧️'];
  document.getElementById('calm-icon').textContent = icons[calmMode];
  saveData();
}

function toggleNightMode() {
  const isNight = document.documentElement.classList.toggle('night-mode');
  document.getElementById('night-icon').textContent = isNight ? '☀️' : '🌙';
  saveData();
}

function showMainView() {
  document.getElementById('about-page').classList.remove('active');
}

function showAboutPage() {
  document.getElementById('about-page').classList.add('active');
}

function hideAboutPage() {
  document.getElementById('about-page').classList.remove('active');
}

// Simple seed + render for testing
function seedData() {
  if (posts.length > 0) return;
  const now = Date.now();
  posts = [{ id: 1, text: "Welcome to the archive.", timestamp: now, images: [] }];
  galleryImages = [];
}

function renderPosts() {
  const container = document.getElementById('posts-container');
  container.innerHTML = '<div style="padding:40px;color:var(--muted);text-align:center;">Your posts will appear here.</div>';
}

function renderGallery() {
  // minimal for now
}

seedData();
loadData();
renderPosts();
renderGallery();
</script>
</body>
</html>
